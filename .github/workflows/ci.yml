name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_gpu:
        description: 'Run GPU smoke tests on a GPU-enabled self-hosted runner'
        required: false
        default: 'false'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          python -m pytest -q || true
          # Some tests can be executed directly if pytest isn't available in runner.
          # Fallback to running individual test scripts to improve visibility.
          python tests/test_sorting.py || true
          python tests/test_data_structures.py || true
          python tests/test_sorting_extended.py || true
          python tests/test_searching.py || true
          python tests/test_strings.py || true
          python tests/test_geometry.py || true

  gpu-smoke:
    # This job runs only when the workflow is manually dispatched with run_gpu=true
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_gpu == 'true' }}
    runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies (GPU)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run GPU smoke tests
        run: |
          # These tests are safe and use CPU fallbacks if GPU libs are missing.
          python tests/test_gpu_kernels.py || true
          python tests/test_numba_spmv.py || true
