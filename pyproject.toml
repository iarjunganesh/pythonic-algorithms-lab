[tool.ruff]
target-version = "py314"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.ruff.lint.per-file-ignores]
# benchmarks/run_benchmarks.py inserts PROJECT_ROOT into sys.path before importing
# local packages — E402 (module-level import not at top) is intentional here.
# E501 is suppressed for long usage example lines in docstrings and argparse help.
"benchmarks/run_benchmarks.py" = ["E402", "E501"]
# dashboard_app.py uses Dash HTML/CSS style dicts that are intentionally long.
"benchmarks/dashboard_app.py" = ["E501"]
